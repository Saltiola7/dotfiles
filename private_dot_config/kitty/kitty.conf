include mocha.conf
macos_titlebar_color background
notify_on_cmd_finish never

allow_remote_control socket-only
listen_on unix:~/.local/share/kitty/control-socket

# BEGIN_KITTY_FONTS
font_family      family="Monofur Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
font_size 14.0
enable_audio_bell no

# ── Sessions ──
# Use splits layout by default (supports hsplit/vsplit for session restore)
enabled_layouts splits,fat,grid,horizontal,stack,tall,vertical

# Filter tab bar to show only tabs from the active session
# (session:~ matches active session, session:^$ matches tabs not in any session)
tab_bar_filter session:~ or session:^$

# Save current workspace snapshot (auto-detects workspace name)
map f16 launch --type=background ~/.config/kitty/save-workspace.py

# New windows/tabs open in the current window's working directory
map kitty_mod+enter new_window_with_cwd
map kitty_mod+t new_tab_with_cwd

# ── Quick Terminal (drop-down from top of screen) ──
macos_global_shortcut ctrl+space
