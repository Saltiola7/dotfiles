set -g mouse on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

# Set the Catppuccin flavor
set -g @catppuccin_flavor 'mocha'

# --- Catppuccin Status Bar Customization ---
set -g @catppuccin_status_modules_right ""
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator "█"

# Force Catppuccin to use the actual tmux window name
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Initialize TMUX plugin manager
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Automatically restore the last saved environment
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Tell tmux-resurrect to remember and restart the junie-tmux process
set -g @resurrect-processes '"~/.local/bin/junie-tmux" junie-tmux junie'

# Prevent dynamic renaming by CLI apps and tmux itself
set-option -g allow-rename off
set-option -wg automatic-rename off

# Disable status notifications
set -g display-time 0

# --- NAVIGATION & SCROLLING ---
# Enable Vi-mode for scrolling/copying
set-window-option -g mode-keys vi

# 1. Fast Tab Navigation: Shift + Left/Right Arrow
bind-key -n S-Left previous-window
bind-key -n S-Right next-window

# 2. Fast Pane Navigation: Ctrl + Arrow Keys
bind-key -n C-Left select-pane -L
bind-key -n C-Right select-pane -R
bind-key -n C-Up select-pane -U
bind-key -n C-Down select-pane -D

# 3. Fast Scrolling: Shift + Up/Down Arrow
# Enter copy mode and scroll up with Shift+Up
bind-key -n S-Up copy-mode -u
# In copy mode, Shift+Up/Down scrolls half-page
bind-key -T copy-mode-vi S-Up send-keys -X halfpage-up
bind-key -T copy-mode-vi S-Down send-keys -X halfpage-down

run '~/.tmux/plugins/tpm/tpm'
